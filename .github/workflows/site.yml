name: Build and deploy autonomous site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: pip install google-genai

      - name: Generate site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p site
          python <<'PY'
from google import genai
from pathlib import Path
import html
import datetime
import re

client = genai.Client()

response = client.models.generate_content(
    model="gemini-2.5-flash",
    contents=(
        "Write a highly specific beginner guide targeting a real search query about budget home office or remote work setups. "
        "Focus on ONE narrow, practical topic with clear buying or setup intent. "
        "Examples include: best cheap desk setup for small spaces, budget dual monitor setup under $200, how to build a home office for under $100. "
        "Start with a clear SEO-friendly title on the first line. "
        "Then write practical, step-by-step advice. "
        "Be specific, actionable, and avoid fluff. "
        "Output format: first line is the title, rest is content."
    ),
)

text = response.text.strip()
lines = [line.strip() for line in text.splitlines() if line.strip()]
title = (lines[0] if lines else "Budget Home Office Setup Guide")[:80]

slug = re.sub(r"[^a-z0-9]+", "-", title.lower()).strip("-")[:50] or "guide"
date = datetime.datetime.utcnow().strftime("%Y-%m-%d")
fname = f"{date}-{slug}.html"

site = Path("site")
site.mkdir(exist_ok=True)

# Article page
(site / fname).write_text(
    f"""<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{html.escape(title)}</title>
</head>
<body>
  <p><a href="index.html">Home</a></p>
  <h1>{html.escape(title)}</h1>
  <pre style="white-space:pre-wrap;font:inherit">{html.escape(text)}</pre>
</body>
</html>
""",
    encoding="utf-8",
)

# Collect pages
files = sorted(
    [f.name for f in site.glob("*.html") if f.name not in ["index.html", "about.html"]],
    reverse=True,
)

links = "".join(
    f'<li><a href="{f}">{html.escape(f[:-5].replace("-", " ").title())}</a></li>'
    for f in files[:50]
)

# Homepage
(site / "index.html").write_text(
    f"""<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Remote Work Tool Guide</title>
</head>
<body>
  <h1>Remote Work Tool Guide</h1>
  <p><a href="about.html">About</a></p>
  <ul>{links}</ul>
</body>
</html>
""",
    encoding="utf-8",
)

# About page
(site / "about.html").write_text(
    """<!doctype html>
<html>
<head><meta charset="utf-8"><title>About</title></head>
<body>
  <p><a href="index.html">Home</a></p>
  <h1>About</h1>
  <p>This site publishes AI-generated guides about budget-friendly setups.</p>
</body>
</html>
""",
    encoding="utf-8",
)

# CLEAN sitemap (fixed)
base = "https://deskflowhq.github.io"
urls = ["index.html", "about.html"] + files

sitemap_xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
sitemap_xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'

for u in urls:
    sitemap_xml += f'  <url>\n    <loc>{base}/{u}</loc>\n  </url>\n'

sitemap_xml += '</urlset>'

(site / "sitemap.xml").write_text(sitemap_xml, encoding="utf-8")

# Robots
(site / "robots.txt").write_text(
    f"""User-agent: *
Allow: /
Sitemap: {base}/sitemap.xml
""",
    encoding="utf-8",
)
PY

      - name: Save generated pages to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          git diff --cached --quiet || git commit -m "Update generated site content"
          git push origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4