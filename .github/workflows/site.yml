name: Build and deploy autonomous site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: pip install google-genai

      - name: Generate site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p site
          python <<'PY'
          from google import genai
          from pathlib import Path
          import html
          import re
          from datetime import datetime, timezone

          site = Path("site")
          site.mkdir(exist_ok=True)

          client = genai.Client()

          response = client.models.generate_content(
              model="gemini-2.5-flash",
              contents=(
                  "Write a practical beginner guide about one specific cheap home office or remote work setup. "
                  "The first line must be a short clear title with no quotation marks. "
                  "After that, write plain text advice that is practical, concrete, and beginner-friendly. "
                  "Keep it focused on one specific setup problem or budget goal."
              ),
          )

          text = (response.text or "").strip()
          lines = [line.strip() for line in text.splitlines() if line.strip()]
          title = lines[0] if lines else "Cheap Home Office Setup Guide"
          title = title[:80]

          slug = re.sub(r"[^a-z0-9]+", "-", title.lower()).strip("-")[:50]
          if not slug:
              slug = "guide"

          date_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          article_name = f"{date_str}-{slug}.html"
          article_path = site / article_name

          article_html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>{html.escape(title)}</title>
            <meta name="description" content="Budget-friendly remote work setup guide.">
          </head>
          <body>
            <p><a href="index.html">Home</a></p>
            <h1>{html.escape(title)}</h1>
            <pre style="white-space: pre-wrap; font: inherit;">{html.escape(text)}</pre>
          </body>
          </html>
          """
          article_path.write_text(article_html, encoding="utf-8")

          article_files = sorted(
              [
                  f.name
                  for f in site.glob("*.html")
                  if f.name not in {"index.html", "about.html"}
              ],
              reverse=True,
          )

          links = "".join(
              f'<li><a href="{name}">{html.escape(name[:-5].replace("-", " ").title())}</a></li>'
              for name in article_files[:50]
          )

          index_html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Remote Work Tool Guide</title>
            <meta name="description" content="Budget-friendly guides for remote work and home office setups.">
          </head>
          <body>
            <h1>Remote Work Tool Guide</h1>
            <p>Simple AI-generated guides for affordable remote work setups.</p>
            <p><a href="about.html">About</a></p>
            <h2>Latest guides</h2>
            <ul>{links}</ul>
          </body>
          </html>
          """
          (site / "index.html").write_text(index_html, encoding="utf-8")

          about_html = """<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>About</title>
          </head>
          <body>
            <p><a href="index.html">Home</a></p>
            <h1>About</h1>
            <p>This site publishes AI-generated guides about budget-friendly remote work and home office setups.</p>
            <p>Content may be imperfect or outdated.</p>
          </body>
          </html>
          """
          (site / "about.html").write_text(about_html, encoding="utf-8")

          base = "https://deskflowhq.github.io"
          urls = ["index.html", "about.html"] + article_files

          sitemap_xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          sitemap_xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          for url in urls:
              sitemap_xml += f"  <url>\n    <loc>{base}/{url}</loc>\n  </url>\n"
          sitemap_xml += "</urlset>\n"
          (site / "sitemap.xml").write_text(sitemap_xml, encoding="utf-8")

          robots_txt = (
              "User-agent: *\n"
              "Allow: /\n"
              f"Sitemap: {base}/sitemap.xml\n"
          )
          (site / "robots.txt").write_text(robots_txt, encoding="utf-8")
          PY

      - name: Save generated pages to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          git diff --cached --quiet || git commit -m "Update generated site content"
          git push origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4