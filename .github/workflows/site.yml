name: Build and deploy autonomous site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Sync to latest main
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependency
        run: pip install google-genai

      - name: Generate styled site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p site
          python <<'PY'
          from google import genai
          from pathlib import Path
          import html
          import re
          from datetime import datetime, timezone

          site = Path("site")
          site.mkdir(exist_ok=True)

          client = genai.Client()

          response = client.models.generate_content(
              model="gemini-2.5-flash",
              contents=(
                  "Write a practical beginner guide about one specific cheap home office or remote work setup. "
                  "The first line must be a short clear title with no quotation marks. "
                  "After that, write plain text advice that is practical, concrete, and beginner-friendly. "
                  "Keep it focused on one specific setup problem or budget goal. "
                  "Use short paragraphs and helpful subheadings in plain text."
              ),
          )

          text = (response.text or "").strip()
          lines = [line.rstrip() for line in text.splitlines()]
          nonempty = [line.strip() for line in lines if line.strip()]
          title = nonempty[0] if nonempty else "Cheap Home Office Setup Guide"
          title = title[:80]

          slug = re.sub(r"[^a-z0-9]+", "-", title.lower()).strip("-")[:50]
          if not slug:
              slug = "guide"

          date_str = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          article_name = f"{date_str}-{slug}.html"
          article_path = site / article_name

          body_parts = []
          for line in lines[1:]:
              stripped = line.strip()
              if not stripped:
                  continue
              if len(stripped) < 70 and not stripped.endswith("."):
                  body_parts.append(f"<h2>{html.escape(stripped)}</h2>")
              else:
                  body_parts.append(f"<p>{html.escape(stripped)}</p>")

          if not body_parts:
              body_parts.append("<p>Content coming soon.</p>")

          article_body = "\n".join(body_parts)

          styles = """
          :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --line: #e5e7eb;
            --accent: #2563eb;
            --accent-soft: #eff6ff;
            --max: 920px;
            --radius: 16px;
          }
          * { box-sizing: border-box; }
          body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
          }
          a { color: var(--accent); text-decoration: none; }
          a:hover { text-decoration: underline; }
          .wrap {
            max-width: var(--max);
            margin: 0 auto;
            padding: 24px;
          }
          .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding: 18px 0;
          }
          .brand {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text);
          }
          .navlinks {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
          }
          .hero {
            background: linear-gradient(180deg, #ffffff, #f8fbff);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 28px;
          }
          .hero h1 {
            margin: 0 0 12px 0;
            font-size: 2rem;
            line-height: 1.15;
          }
          .hero p {
            margin: 0;
            color: var(--muted);
            max-width: 700px;
          }
          .panel {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
          }
          .panel h2 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 1.25rem;
          }
          .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
          }
          .card {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 18px;
          }
          .card h3 {
            margin: 0 0 8px 0;
            font-size: 1rem;
            line-height: 1.3;
          }
          .card p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
          }
          .article-list {
            display: grid;
            gap: 14px;
          }
          .article-item {
            background: var(--surface);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 18px;
          }
          .article-item .meta {
            color: var(--muted);
            font-size: 0.9rem;
            margin-top: 6px;
          }
          .content h1 {
            margin-top: 0;
            font-size: 2rem;
            line-height: 1.15;
          }
          .content h2 {
            margin-top: 28px;
            margin-bottom: 10px;
            font-size: 1.2rem;
          }
          .content p {
            margin: 0 0 14px 0;
          }
          .back {
            display: inline-block;
            margin-bottom: 18px;
            padding: 8px 12px;
            border-radius: 999px;
            background: var(--accent-soft);
          }
          .footer {
            color: var(--muted);
            font-size: 0.92rem;
            padding: 8px 0 32px 0;
          }
          @media (max-width: 640px) {
            .wrap { padding: 16px; }
            .hero { padding: 24px; }
            .hero h1 { font-size: 1.6rem; }
          }
          """

          article_html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>{html.escape(title)}</title>
            <meta name="description" content="Budget-friendly remote work setup guide.">
            <style>{styles}</style>
          </head>
          <body>
            <div class="wrap">
              <div class="nav">
                <a class="brand" href="index.html">Remote Work Tool Guide</a>
                <div class="navlinks">
                  <a href="index.html">Home</a>
                  <a href="about.html">About</a>
                </div>
              </div>

              <div class="panel content">
                <a class="back" href="index.html">← Back to all guides</a>
                <h1>{html.escape(title)}</h1>
                <p class="meta">Published {html.escape(date_str)}</p>
                {article_body}
              </div>

              <div class="footer">
                AI-generated informational content. Verify important details before making purchases.
              </div>
            </div>
          </body>
          </html>
          """
          article_path.write_text(article_html, encoding="utf-8")

          article_files = sorted(
              [
                  f.name
                  for f in site.glob("*.html")
                  if f.name not in {"index.html", "about.html"}
              ],
              reverse=True,
          )

          items = []
          for name in article_files[:24]:
              label = name[:-5].replace("-", " ").title()
              pretty_date = ""
              if len(name) >= 10 and name[4] == "-" and name[7] == "-":
                  pretty_date = name[:10]
              items.append(
                  f'''
                  <div class="article-item">
                    <h3><a href="{html.escape(name)}">{html.escape(label)}</a></h3>
                    <div class="meta">{html.escape(pretty_date)}</div>
                  </div>
                  '''
              )
          items_html = "\n".join(items) if items else "<p>No guides yet.</p>"

          index_html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Remote Work Tool Guide</title>
            <meta name="description" content="Budget-friendly guides for remote work and home office setups.">
            <style>{styles}</style>
          </head>
          <body>
            <div class="wrap">
              <div class="nav">
                <a class="brand" href="index.html">Remote Work Tool Guide</a>
                <div class="navlinks">
                  <a href="index.html">Home</a>
                  <a href="about.html">About</a>
                </div>
              </div>

              <div class="hero">
                <h1>Affordable remote work setups, explained simply</h1>
                <p>
                  This site publishes easy-to-follow guides for building practical home office and remote work setups on a budget.
                </p>
              </div>

              <div class="panel">
                <h2>What you’ll find here</h2>
                <div class="grid">
                  <div class="card">
                    <h3>Budget setup ideas</h3>
                    <p>Low-cost ways to build workable spaces without overspending.</p>
                  </div>
                  <div class="card">
                    <h3>Beginner-friendly guides</h3>
                    <p>Simple explanations and practical steps instead of jargon.</p>
                  </div>
                  <div class="card">
                    <h3>Focused topics</h3>
                    <p>One problem at a time, so each guide is easier to use.</p>
                  </div>
                </div>
              </div>

              <div class="panel">
                <h2>Latest guides</h2>
                <div class="article-list">
                  {items_html}
                </div>
              </div>

              <div class="footer">
                Built to publish AI-generated guides about budget-friendly remote work setups.
              </div>
            </div>
          </body>
          </html>
          """
          (site / "index.html").write_text(index_html, encoding="utf-8")

          about_html = f"""<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>About</title>
            <style>{styles}</style>
          </head>
          <body>
            <div class="wrap">
              <div class="nav">
                <a class="brand" href="index.html">Remote Work Tool Guide</a>
                <div class="navlinks">
                  <a href="index.html">Home</a>
                  <a href="about.html">About</a>
                </div>
              </div>

              <div class="panel content">
                <h1>About</h1>
                <p>This site publishes AI-generated guides about budget-friendly remote work and home office setups.</p>
                <p>It is designed to make setup ideas easier to browse, compare, and understand.</p>
                <p>Content may be imperfect or outdated, so important details should be double-checked.</p>
              </div>

              <div class="footer">
                Remote Work Tool Guide
              </div>
            </div>
          </body>
          </html>
          """
          (site / "about.html").write_text(about_html, encoding="utf-8")

          base = "https://deskflowhq.github.io"
          urls = ["index.html", "about.html"] + article_files

          sitemap_xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          sitemap_xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          for url in urls:
              sitemap_xml += f"  <url>\n    <loc>{base}/{url}</loc>\n  </url>\n"
          sitemap_xml += "</urlset>\n"
          (site / "sitemap.xml").write_text(sitemap_xml, encoding="utf-8")

          robots_txt = (
              "User-agent: *\n"
              "Allow: /\n"
              f"Sitemap: {base}/sitemap.xml\n"
          )
          (site / "robots.txt").write_text(robots_txt, encoding="utf-8")
          PY

      - name: Save generated pages to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site
          git diff --cached --quiet && exit 0
          git commit -m "Update generated site content"
          git push origin main

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4