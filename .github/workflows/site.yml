name: Build and deploy autonomous site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install google-genai

      - name: Generate site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p site
          python <<'PY'
from google import genai
from pathlib import Path

client = genai.Client()

response = client.models.generate_content(
    model="gemini-2.5-flash",
    contents="Write a helpful short guide about budget home office setups."
)

html = f"""
<html>
<head><title>Remote Work Tool Guide</title></head>
<body>
<h1>Remote Work Tool Guide</h1>
<p>{response.text}</p>
</body>
</html>
"""

Path("site/index.html").write_text(html)
PY

      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4