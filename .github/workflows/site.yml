name: Build and deploy autonomous site

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install google-genai

      - name: Generate AI homepage
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p site
          python -c "from google import genai; from pathlib import Path; import html, datetime; c=genai.Client(); r=c.models.generate_content(model='gemini-2.5-flash', contents='Write a helpful beginner guide about a specific budget home office setup. Include a title and practical tips.'); t=r.text; now=datetime.datetime.utcnow().strftime('%Y-%m-%d'); Path('site/article.html').write_text('<h1>Latest Guide</h1><pre>'+html.escape(t)+'</pre>'); Path('site/index.html').write_text('<!doctype html><html><body><h1>Remote Work Tool Guide</h1><p><a href=\"article.html\">Read latest guide</a></p></body></html>')"
      - uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4